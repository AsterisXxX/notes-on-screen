<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>iPad Sticky Notes Canvas</title>
    <!-- Bootstrap 5 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
      * {
        touch-action: manipulation;
        box-sizing: border-box;
      }

      html,
      body {
        /* Gunakan dvh (Dynamic Viewport Height) agar tidak terpotong Top Bar Safari iPad */
        height: 100dvh;
        width: 100vw;
        margin: 0;
        padding: 0;
        background-color: #d1d5db;
        font-family:
          "Segoe UI",
          system-ui,
          -apple-system,
          sans-serif;
        user-select: none;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        /* Mencegah overlap dengan Safari Status/Address Bar */
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
      }

      /* Container utama flexbox - Adaptif iPad */
      .app-container {
        height: 92dvh;
        max-height: 720px;
        display: flex;
        flex-direction: row;
        align-items: stretch;
        border-radius: 0;
        box-shadow:
          0 20px 35px -10px rgba(0, 0, 0, 0.35),
          -5px 15px 20px -5px rgba(0, 0, 0, 0.2);
        transition: background-color 0.4s ease;
        overflow: hidden;
      }

      /* Panel Kiri: Kontrol UI */
      .ui-panel {
        width: 280px;
        height: 100%;
        background: rgba(255, 255, 255, 0.25);
        backdrop-filter: blur(8px);
        border-right: 2px dashed rgba(0, 0, 0, 0.15);
        flex-shrink: 0;
      }

      /* Touch-friendly buttons */
      .btn-touch {
        padding: 12px 16px;
        font-size: 1.05rem;
        font-weight: 600;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        min-height: 52px;
      }

      .btn-touch:active {
        transform: scale(0.97);
      }

      /* Area Canvas Kanan (Fixed Square 1:1) */
      .canvas-container {
        position: relative;
        cursor: crosshair;
        height: 100%;
        flex-shrink: 0;
        overflow: hidden;
      }

      canvas {
        touch-action: none;
        display: block;
      }

      /* Circle cursor preview untuk eraser */
      #eraserCursor {
        position: absolute;
        pointer-events: none;
        border: 2px solid #333;
        border-radius: 50%;
        transform: translate(-50%, -50%);
        display: none;
        background-color: rgba(255, 255, 255, 0.4);
        z-index: 10;
      }

      /* Floating Popup Slider Ala IbisPaint */
      .eraser-popup {
        position: absolute;
        bottom: 110%;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(33, 37, 41, 0.95);
        backdrop-filter: blur(6px);
        padding: 16px;
        border-radius: 14px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        display: none;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        z-index: 100;
        width: 220px;
      }

      .eraser-popup::after {
        content: "";
        position: absolute;
        top: 100%;
        left: 50%;
        transform: translateX(-50%);
        border-width: 8px;
        border-style: solid;
        border-color: rgba(33, 37, 41, 0.95) transparent transparent transparent;
      }

      .form-range::-webkit-slider-thumb {
        width: 24px;
        height: 24px;
      }
    </style>
  </head>
  <body>
    <div class="app-container" id="stickyNoteCard">
      <!-- KOLOM KIRI: UI & PANEL KONTROL -->
      <div class="ui-panel p-4 d-flex flex-column justify-content-between">
        <div>
          <!-- Header Info -->
          <div class="mb-3">
            <h5 class="fw-bold text-dark m-0 d-flex align-items-center">
              <i class="bi bi-sticky-fill me-2 fs-4"></i>Sticky Note
            </h5>
            <small class="text-dark opacity-75">Canvas Coret</small>
          </div>

          <!-- Input Nama Pembuat (Maksimal 10 Karakter + Dismiss Keyboard di Enter) -->
          <div class="mb-3">
            <label for="inputUsername" class="form-label fw-bold text-dark mb-1"
              >Nama Pembuat</label
            >
            <div class="input-group">
              <span class="input-group-text bg-dark text-white border-0"
                ><i class="bi bi-person-fill"></i
              ></span>
              <input
                type="text"
                id="inputUsername"
                class="form-control border-0 shadow-sm"
                placeholder="Maks 10 char"
                maxlength="10"
                enterkeyhint="done"
                style="height: 48px; border-radius: 0 10px 10px 0"
              />
            </div>
          </div>

          <!-- Mode Drawing (Coret / Hapus) -->
          <div class="d-flex flex-column gap-2 mb-3 position-relative">
            <label class="form-label fw-bold text-dark mb-0">Tools</label>

            <button id="btnPencil" class="btn btn-dark btn-touch active">
              <i class="bi bi-pencil-fill"></i> Coret
            </button>

            <!-- Tombol Eraser + Floating Popup -->
            <div class="position-relative">
              <button
                id="btnEraser"
                class="btn btn-outline-dark btn-touch w-100"
              >
                <i class="bi bi-eraser-fill"></i> Hapus
              </button>

              <!-- Floating Popup Slider Eraser -->
              <div id="eraserPopup" class="eraser-popup text-white">
                <div
                  class="d-flex justify-content-between w-100 align-items-center fw-bold"
                >
                  <span>Ukuran Hapus</span>
                  <span
                    id="eraserSizeVal"
                    class="badge bg-light text-dark px-2 py-1"
                    >20 px</span
                  >
                </div>
                <input
                  type="range"
                  class="form-range"
                  id="eraserSize"
                  min="5"
                  max="100"
                  value="20"
                />
              </div>
            </div>
          </div>

          <!-- Undo & Redo -->
          <div class="d-flex flex-column gap-2 mb-3">
            <label class="form-label fw-bold text-dark mb-0">Riwayat</label>
            <div class="d-flex gap-2">
              <button
                id="btnUndo"
                class="btn btn-outline-dark btn-touch flex-fill"
                title="Undo"
              >
                <i class="bi bi-arrow-counterclockwise fs-4"></i>
              </button>
              <button
                id="btnRedo"
                class="btn btn-outline-dark btn-touch flex-fill"
                title="Redo"
              >
                <i class="bi bi-arrow-clockwise fs-4"></i>
              </button>
            </div>
          </div>
        </div>

        <!-- Tombol Submit & Save -->
        <div>
          <button
            id="btnSubmit"
            class="btn btn-dark btn-touch w-100 py-3 shadow"
          >
            <i class="bi bi-send-fill fs-5"></i> Submit & Save
          </button>
        </div>
      </div>

      <!-- KOLOM KANAN: CANVAS PERSEGI 1:1 -->
      <div class="canvas-container" id="canvasWrapper">
        <canvas id="noteCanvas"></canvas>
        <div id="eraserCursor"></div>
      </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Logic App JS -->
    <script src="script.js"></script>
  </body>
</html>
